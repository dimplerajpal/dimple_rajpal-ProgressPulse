<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ProgressPulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
 
:root{
  --font-head:'Inter',sans-serif;
  --font-body:'Inter',sans-serif;
  --radius:16px;
  --radius-sm:10px;
  --trans:0.22s cubic-bezier(0.4,0,0.2,1);
  --space-xxs:6px;
  --space-xs:10px;
  --space-sm:14px;
  --space-md:20px;
  --space-lg:26px;
  --space-xl:32px;
  --space-xxl:40px;
}
 
/* ── DARK THEME (default) ── */
[data-theme="dark"]{
  --bg:#07090f;
  --surface:#0d1117;
  --surface2:#131920;
  --surface3:#1a2233;
  --border:rgba(255,255,255,0.07);
  --border-hover:rgba(255,255,255,0.14);
  --text:#dde3ee;
  --text-muted:rgba(221,227,238,0.45);
  --text-faint:rgba(221,227,238,0.25);
  --accent:#e879f9;
  --accent-glow:rgba(232,121,249,0.15);
  --accent-soft:rgba(232,121,249,0.1);
  --accent2:#38bdf8;
  --accent2-soft:rgba(56,189,248,0.1);
  --accent3:#fb923c;
  --accent3-soft:rgba(251,146,60,0.1);
  --success:#34d399;
  --danger:#f87171;
  --warning:#fbbf24;
  --shadow:0 20px 60px rgba(0,0,0,0.5);
  --sidebar-bg:#0d1117;
  --nav-active-bg:rgba(232,121,249,0.12);
  --nav-hover-bg:rgba(232,121,249,0.07);
  --btn-primary-text:#07090f;
  --scrollbar:rgba(255,255,255,0.08);
}
 
/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f4f6fb;
  --surface:#ffffff;
  --surface2:#eef1f8;
  --surface3:#e4e9f4;
  --border:rgba(0,0,0,0.08);
  --border-hover:rgba(0,0,0,0.14);
  --text:#1a1e2e;
  --text-muted:rgba(26,30,46,0.5);
  --text-faint:rgba(26,30,46,0.3);
  --accent:#c026d3;
  --accent-glow:rgba(192,38,211,0.12);
  --accent-soft:rgba(192,38,211,0.08);
  --accent2:#0284c7;
  --accent2-soft:rgba(2,132,199,0.08);
  --accent3:#ea580c;
  --accent3-soft:rgba(234,88,12,0.08);
  --success:#059669;
  --danger:#dc2626;
  --warning:#d97706;
  --shadow:0 8px 30px rgba(0,0,0,0.1);
  --sidebar-bg:#ffffff;
  --nav-active-bg:rgba(192,38,211,0.1);
  --nav-hover-bg:rgba(192,38,211,0.06);
  --btn-primary-text:#ffffff;
  --scrollbar:rgba(0,0,0,0.1);
}
 
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.55}
 
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}
 
/* ── APP SHELL ── */
.app-shell{display:flex;height:100vh;max-width:1440px;margin:0 auto}
 
/* ── SIDEBAR ── */
.sidebar{
  width:68px;
  background:var(--sidebar-bg);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 0 16px;
  gap:10px;
  position:relative;
  flex-shrink:0;
  z-index:50;
}
 
.logo{
  font-family:var(--font-head);
  font-size:24px;
  font-weight:800;
  color:var(--accent);
  margin-bottom:24px;
  user-select:none;
  letter-spacing:-1px;
}
 
.nav-btn{
  width:44px;
  height:44px;
  border-radius:12px;
  background:transparent;
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--text-muted);
  font-size:17px;
  transition:all var(--trans);
  position:relative;
}
.nav-btn:hover{background:var(--nav-hover-bg);color:var(--accent)}
.nav-btn.active{background:var(--nav-active-bg);color:var(--accent)}
 
.nav-tip{
  position:absolute;
  left:54px;
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);
  font-family:var(--font-body);
  font-size:12px;
  font-weight:500;
  padding:6px 12px;
  border-radius:10px;
  white-space:nowrap;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.15s;
  z-index:200;
}
.nav-btn:hover .nav-tip{opacity:1}
 
.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:10px}
 
.theme-btn{
  width:38px;height:38px;
  border-radius:10px;
  background:transparent;
  border:1px solid var(--border);
  color:var(--text-muted);
  cursor:pointer;
  font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--trans);
}
.theme-btn:hover{background:var(--surface2);color:var(--text)}
 
/* ── MAIN CONTENT ── */
.main{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:32px 32px;
  display:flex;
  flex-direction:column;
  gap:28px;
}
 
/* ── PAGE HEADER ── */
.page-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:24px;
}
.page-title{
  font-family:var(--font-head);
  font-size:clamp(22px,3.5vw,34px);
  font-weight:800;
  letter-spacing:-1px;
  line-height:1.1;
}
.page-sub{color:var(--text-muted);font-size:13.5px;margin-top:12px;font-weight:300}
 
/* ── CARDS ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px;
}
.card-sm{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:18px;
}
 
/* ── STATS ROW ── */
.stats-row{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:16px;
  margin-bottom:20px;
}
.stat-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:20px;
}
.stat-val{
  font-family:var(--font-head);
  font-size:30px;
  font-weight:800;
  letter-spacing:-1px;
  color:var(--accent);
  line-height:1;
}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:8px;text-transform:uppercase;letter-spacing:0.6px}
 
/* ── HABIT GRID ── */
.habit-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
  gap:14px;
}
.habit-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:22px;
  display:flex;
  flex-direction:column;
  gap:16px;
  cursor:pointer;
  transition:border-color var(--trans),transform var(--trans),box-shadow var(--trans);
  position:relative;
  overflow:hidden;
}
.habit-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2.5px;
  background:var(--hc,var(--accent));
  opacity:0.7;
}
.habit-card:hover{
  border-color:var(--border-hover);
  transform:translateY(-2px);
  box-shadow:var(--shadow);
}
.habit-top{display:flex;align-items:center;justify-content:space-between}
.habit-icon{
  width:44px;height:44px;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  background:var(--accent-soft);
  flex-shrink:0;
}
.habit-actions{display:flex;gap:5px;opacity:0;transition:opacity var(--trans)}
.habit-card:hover .habit-actions{opacity:1}
.habit-name{font-family:var(--font-head);font-size:15.5px;font-weight:700;letter-spacing:-0.3px}
.habit-desc{font-size:12.5px;color:var(--text-muted);line-height:1.55;margin-top:6px}
.habit-progress{display:flex;align-items:center;gap:12px}
.pbar-wrap{flex:1;height:6px;background:var(--border);border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;background:var(--hc,var(--accent));transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}
.pbar-pct{font-size:12px;font-weight:700;color:var(--hc,var(--accent));min-width:40px;text-align:right}
 
/* ── COMPLETE BTN ── */
.complete-btn{
  width:100%;
  height:42px;
  border-radius:10px;
  border:1.5px solid var(--border);
  font-family:var(--font-body);
  font-size:13.5px;
  font-weight:600;
  cursor:pointer;
  transition:all var(--trans);
  display:flex;align-items:center;justify-content:center;
  gap:7px;
  background:transparent;
  color:var(--text-muted);
}
.complete-btn:hover{
  background:var(--accent-soft);
  border-color:var(--accent);
  color:var(--accent);
}
.complete-btn.done{
  background:var(--accent-soft);
  border-color:var(--accent);
  color:var(--accent);
}
 
/* ── ICON BUTTON ── */
.icon-btn{
  width:28px;height:28px;
  border-radius:7px;
  background:transparent;
  border:1px solid var(--border);
  color:var(--text-muted);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;
  transition:all var(--trans);
}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.icon-btn.del:hover{background:rgba(248,113,113,0.12);color:var(--danger);border-color:var(--danger)}
 
/* ── BUTTONS ── */
.btn{
  height:42px;
  padding:0 18px;
  border-radius:10px;
  font-family:var(--font-body);
  font-size:13.5px;
  font-weight:600;
  cursor:pointer;
  transition:all var(--trans);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  border:none;
  white-space:nowrap;
}
.btn-primary{background:var(--accent);color:var(--btn-primary-text)}
.btn-primary:hover{opacity:0.88;transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-muted)}
.btn-ghost:hover{border-color:var(--border-hover);color:var(--text)}
.btn-danger{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:var(--danger)}
.btn-danger:hover{background:rgba(248,113,113,0.2)}
.btn-accent2{background:var(--accent2);color:#fff}
.btn-accent2:hover{opacity:0.88}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
 
/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.section-title{font-family:var(--font-head);font-size:15px;font-weight:700;letter-spacing:-0.3px}
 
/* ── RING SVG ── */
.ring-wrap{position:relative;display:inline-flex;flex-shrink:0}
.ring-label{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:var(--font-head);
}
.ring-pct{font-size:16px;font-weight:800;color:var(--text)}
.ring-sub{font-size:9px;color:var(--text-muted);letter-spacing:0.5px;text-transform:uppercase}
 
/* ── CALENDAR HEATMAP ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{
  aspect-ratio:1;border-radius:4px;font-size:9.5px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);transition:all var(--trans);
  background:var(--surface2);
}
.cal-day.done{color:var(--accent)}
.cal-day.today{outline:1.5px solid var(--accent)}
.cal-day.future{opacity:0.3}
.cal-day.editable{cursor:pointer}
.cal-day.editable:hover{transform:translateY(-1px);background:var(--surface3)}
 
/* ── PHOTO GRID ── */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px}
.photo-thumb{
  aspect-ratio:1;border-radius:12px;
  overflow:hidden;position:relative;
  cursor:pointer;background:var(--surface2);
  border:1px solid var(--border);
}
.photo-thumb img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s}
.photo-thumb:hover img{transform:scale(1.05)}
.photo-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 55%);
  opacity:0;transition:opacity var(--trans);
  display:flex;align-items:flex-end;
  padding:10px;font-size:11px;color:rgba(255,255,255,0.85);
}
.photo-thumb:hover .photo-overlay{opacity:1}
 
/* ── UPLOAD ZONE ── */
.upload-zone{
  border:2px dashed var(--border);
  border-radius:var(--radius);
  padding:38px 20px;
  text-align:center;
  cursor:pointer;
  transition:all var(--trans);
}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent-soft)}
.upload-icon{font-size:34px;margin-bottom:10px}
.upload-text{font-size:13.5px;color:var(--text-muted)}
.upload-text strong{color:var(--accent)}
 
/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  z-index:900;padding:20px;
  animation:fadeIn 0.18s;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:28px;
  width:100%;
  max-width:480px;
  max-height:90vh;
  overflow-y:auto;
  animation:slideUp 0.22s cubic-bezier(0.4,0,0.2,1);
}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{
  font-family:var(--font-head);
  font-size:19px;font-weight:800;
  letter-spacing:-0.5px;
  margin-bottom:20px;
  display:flex;align-items:center;justify-content:space-between;
}
 
/* ── FORM ── */
.form-group{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.form-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px}
.form-input,.form-textarea,.form-select{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:9px;
  padding:12px 14px;
  color:var(--text);
  font-family:var(--font-body);
  font-size:13.5px;
  transition:border-color var(--trans);
  width:100%;
  outline:none;
}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:72px}
.form-select option{background:var(--surface)}
 
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}
.emoji-opt{
  height:36px;border-radius:8px;
  background:var(--surface2);border:1.5px solid var(--border);
  font-size:17px;cursor:pointer;
  transition:all var(--trans);
  display:flex;align-items:center;justify-content:center;
}
.emoji-opt:hover,.emoji-opt.sel{border-color:var(--accent);background:var(--accent-soft)}
 
.color-grid{display:flex;gap:7px;flex-wrap:wrap}
.color-opt{
  width:26px;height:26px;border-radius:50%;
  border:2.5px solid transparent;
  cursor:pointer;transition:all var(--trans);
}
.color-opt.sel{outline:2px solid var(--text);outline-offset:2px}
 
/* ── TOGGLE SWITCH ── */
.toggle{
  width:42px;height:22px;
  border-radius:11px;
  border:none;cursor:pointer;
  position:relative;
  transition:background var(--trans);
  flex-shrink:0;
}
.toggle-thumb{
  position:absolute;top:2px;
  width:18px;height:18px;border-radius:50%;
  transition:left var(--trans);
  pointer-events:none;
}
 
/* ── BADGE ── */
.badge{
  font-size:10.5px;font-weight:700;
  padding:3px 9px;border-radius:20px;
  letter-spacing:0.4px;text-transform:uppercase;
}
.badge-ok{background:rgba(52,211,153,0.15);color:var(--success)}
.badge-pending{background:rgba(232,121,249,0.15);color:var(--accent)}
.badge-warn{background:rgba(251,191,36,0.15);color:var(--warning)}
 
/* ── AI BOX ── */
.ai-box{
  background:linear-gradient(135deg,var(--accent-soft) 0%,var(--accent2-soft) 100%);
  border:1px solid var(--accent-glow);
  border-radius:var(--radius-sm);
  padding:18px;
}
.ai-box-label{
  font-size:11px;font-weight:700;
  color:var(--accent);text-transform:uppercase;
  letter-spacing:1px;
  display:flex;align-items:center;gap:7px;
  margin-bottom:9px;
}
.ai-box-text{font-size:13.5px;line-height:1.65;color:var(--text)}
 
/* ── ANALYSIS CARD ── */
.analysis-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
}
.analysis-header{
  padding:18px 22px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.before-after{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--border)}
.ba-img{
  aspect-ratio:1;width:100%;
  object-fit:cover;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  color:var(--text-muted);font-size:13px;
}
.metric-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 0;border-bottom:1px solid var(--border);font-size:13.5px;
}
.metric-row:last-child{border-bottom:none}
.metric-name{color:var(--text-muted)}
.metric-val{font-weight:700;color:var(--accent);font-family:var(--font-head)}
 
/* ── TIMELAPSE ── */
.timelapse-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
}
 
/* ── WIDGET BOXES ── */
.widget-preview{display:flex;gap:14px;flex-wrap:wrap}
.widget-box{
  width:155px;height:155px;
  background:linear-gradient(145deg,var(--surface3) 0%,var(--surface) 100%);
  border-radius:26px;
  border:1px solid var(--border);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:7px;padding:14px;
  box-shadow:var(--shadow);
  position:relative;overflow:hidden;
}
.widget-box::before{
  content:'';position:absolute;top:-35px;right:-35px;
  width:90px;height:90px;border-radius:50%;
  background:radial-gradient(circle,var(--accent-soft) 0%,transparent 70%);
}
 
/* ── TAB BAR ── */
.tab-bar{
  display:flex;gap:3px;
  background:var(--surface2);
  border-radius:11px;padding:3px;
  width:fit-content;
}
.tab-btn{
  height:34px;padding:0 14px;
  border-radius:8px;border:none;
  background:transparent;color:var(--text-muted);
  font-family:var(--font-body);font-size:13px;font-weight:500;
  cursor:pointer;transition:all var(--trans);white-space:nowrap;
}
.tab-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.2)}
 
/* ── STREAK ── */
.streak-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(251,191,36,0.12);color:var(--warning);
  border-radius:20px;padding:2px 9px;
  font-size:11.5px;font-weight:700;
}
.note-chip{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:7px 11px;
  font-size:12px;color:var(--text-muted);font-style:italic;margin-top:5px;
}
 
/* ── AI PULSE ── */
.ai-pulse{display:inline-flex;gap:3px;align-items:center}
.ai-pulse span{
  width:5px;height:5px;border-radius:50%;
  background:var(--accent);
  animation:dotPulse 1.2s infinite ease-in-out;
}
.ai-pulse span:nth-child(2){animation-delay:0.2s}
.ai-pulse span:nth-child(3){animation-delay:0.4s}
@keyframes dotPulse{
  0%,100%{transform:scale(0.6);opacity:0.4}
  50%{transform:scale(1);opacity:1}
}
 
/* ── SKELETON ── */
.skeleton{
  background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
  background-size:400% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:8px;
}
@keyframes shimmer{
  0%{background-position:100% 0}
  100%{background-position:-100% 0}
}
 
/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%);
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:11px 18px;
  font-size:13.5px;
  display:flex;align-items:center;gap:9px;
  z-index:9999;
  animation:toastIn 0.28s cubic-bezier(0.4,0,0.2,1);
  box-shadow:var(--shadow);
  white-space:nowrap;
}
@keyframes toastIn{
  from{transform:translateX(-50%) translateY(18px);opacity:0}
  to{transform:translateX(-50%) translateY(0);opacity:1}
}
.toast.ok{border-color:rgba(52,211,153,0.35);color:var(--success)}
.toast.err{border-color:rgba(248,113,113,0.35);color:var(--danger)}
 
/* ── FADE IN ── */
.fade-in{animation:fadeSlide 0.32s cubic-bezier(0.4,0,0.2,1)}
@keyframes fadeSlide{
  from{opacity:0;transform:translateY(9px)}
  to{opacity:1;transform:translateY(0)}
}
 
/* ── EMPTY STATE ── */
.empty-state{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:55px 20px;text-align:center;gap:10px;
}
.empty-icon{font-size:44px;opacity:0.35}
.empty-title{font-family:var(--font-head);font-size:17px;font-weight:700}
.empty-sub{font-size:13px;color:var(--text-muted);max-width:240px;line-height:1.55}
 
/* ── PROGRESS RING TRACK ── */
.ring-track{stroke:var(--border)}
 
/* ── MONTHLY TREND BARS ── */
.trend-bar{
  background:var(--accent);
  border-radius:4px 4px 0 0;
  opacity:0.4;
  transition:height 0.6s;
  min-height:4px;
}
.trend-bar.current{opacity:0.85}
 
/* ── COLOR SCHEME PICKER ── */
.scheme-grid{display:flex;gap:8px;flex-wrap:wrap}
.scheme-dot{
  width:28px;height:28px;border-radius:50%;
  cursor:pointer;transition:all var(--trans);
  border:2.5px solid transparent;
}
.scheme-dot.sel{outline:2px solid var(--text);outline-offset:2px}
 
/* ── PHOTO VIEWER ── */
.photo-viewer img{
  width:100%;border-radius:10px;
  max-height:58vh;object-fit:contain;
  background:var(--bg);
}
 
/* ── RESPONSIVE ── */
@media(max-width:680px){
  .sidebar{width:52px;padding:14px 0}
  .nav-btn{width:38px;height:38px;font-size:15px}
  .main{padding:18px 14px}
  .habit-grid{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .page-title{font-size:22px}
  .before-after{grid-template-columns:1fr}
  .widget-box{width:130px;height:130px}
}
</style>
</head>
<body>
 
<div class="app-shell">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="logo">⬡</div>
    <button class="nav-btn active" data-page="dashboard" onclick="navigate('dashboard')" title="">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span class="nav-tip">Dashboard</span>
    </button>
    <button class="nav-btn" data-page="photos" onclick="navigate('photos')" title="">

      <span class="nav-tip">Photos</span>
    </button>
    <button class="nav-btn" data-page="analysis" onclick="navigate('analysis')" title="">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span class="nav-tip">AI Analysis</span>
    </button>
    <button class="nav-btn" data-page="timelapse" onclick="navigate('timelapse')" title="">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span class="nav-tip">Timelapse</span>
    </button>
    <button class="nav-btn" data-page="stats" onclick="navigate('stats')" title="">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span class="nav-tip">Stats</span>
    </button>
    <!--
    <button class="nav-btn" data-page="widget" onclick="navigate('widget')" title="">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="6" height="6" rx="1"/><rect x="16" y="3" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/><rect x="2" y="15" width="6" height="6" rx="1"/><rect x="16" y="15" width="6" height="6" rx="1"/></svg>
      <span class="nav-tip">Widget</span>
    </button>
    -->
    <div class="sidebar-bottom">
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="Toggle theme">☀</button>
    </div>
  </nav>
 
  <!-- MAIN -->
  <main class="main" id="mainContent"></main>
</div>
 
<!-- TOAST CONTAINER -->
<div id="toastContainer"></div>
 
<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,10);
const today=()=>new Date().toISOString().split("T")[0];
const fmtDate=d=>new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
const fmtMonth=m=>{const[y,mo]=m.split("-");return new Date(y,mo-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"})};
const currentMonth=()=>new Date().toISOString().slice(0,7);
const daysInMonth=ym=>{const[y,m]=ym.split("-").map(Number);return new Date(y,m,0).getDate()};
const monthDates=ym=>{const n=daysInMonth(ym);return Array.from({length:n},(_,i)=>`${ym}-${String(i+1).padStart(2,"0")}`)};
 
const HABIT_COLORS=["#e879f9","#38bdf8","#fb923c","#a78bfa","#34d399","#f472b6","#60a5fa","#fbbf24","#4ade80","#e11d48"];
const HABIT_EMOJIS=["💊","🏃","💧","🧘","📖","🥗","🌙","🧴","💪","🎯","🧠","❤️","🦷","🌿","🍎","🏋️","✍️","🛌","☀️","🎨"];
 
function loadState(){
  try{const s=localStorage.getItem("pp_v2");return s?JSON.parse(s):null}catch{return null}
}
function saveState(s){
  try{localStorage.setItem("pp_v2",JSON.stringify(s))}catch{}
}
 
const DEMO_HABITS=[
  {id:"h1",name:"Apply Tretinoin",description:"Nightly skincare routine",icon:"🧴",color:"#e879f9",photo_enabled:true,created_at:new Date().toISOString()},
  {id:"h2",name:"Drink 2L Water",description:"Daily hydration goal",icon:"💧",color:"#38bdf8",photo_enabled:false,created_at:new Date().toISOString()},
  {id:"h3",name:"30min Exercise",description:"Morning workout",icon:"🏃",color:"#fb923c",photo_enabled:false,created_at:new Date().toISOString()},
];
 
function seedLogs(habits){
  const logs=[];const month=currentMonth();
  const[y,m]=month.split("-").map(Number);
  const todayD=new Date();
  habits.forEach(h=>{
    const rate=h.id==="h1"?0.82:h.id==="h2"?0.68:0.57;
    for(let d=1;d<todayD.getDate();d++){
      const ds=`${month}-${String(d).padStart(2,"0")}`;
      if(Math.random()<rate)logs.push({id:uid(),habit_id:h.id,date:ds,completed_at:new Date(y,m-1,d,20,0).toISOString()});
    }
  });
  return logs;
}
 
let S=loadState()||{habits:DEMO_HABITS,logs:seedLogs(DEMO_HABITS),photos:[],analyses:[],timelapses:[]};
let currentPage="dashboard";
 
function dispatch(action){
  switch(action.type){
    case"ADD_HABIT":S={...S,habits:[...S.habits,action.habit]};break;
    case"UPDATE_HABIT":S={...S,habits:S.habits.map(h=>h.id===action.id?{...h,...action.data}:h)};break;
    case"DELETE_HABIT":S={...S,habits:S.habits.filter(h=>h.id!==action.id),logs:S.logs.filter(l=>l.habit_id!==action.id)};break;
    case"ADD_LOG":S={...S,logs:[...S.logs,action.log]};break;
    case"REMOVE_LOG":S={...S,logs:S.logs.filter(l=>l.id!==action.id)};break;
    case"ADD_PHOTO":S={...S,photos:[...S.photos,action.photo]};break;
    case"DELETE_PHOTO":S={...S,photos:S.photos.filter(p=>p.id!==action.id)};break;
    case"ADD_ANALYSIS":S={...S,analyses:[...S.analyses.filter(a=>!(a.habit_id===action.analysis.habit_id&&a.month_year===action.analysis.month_year)),action.analysis]};break;
    case"ADD_TIMELAPSE":S={...S,timelapses:[...S.timelapses.filter(t=>!(t.habit_id===action.timelapse.habit_id&&t.month_year===action.timelapse.month_year)),action.timelapse]};break;
  }
  saveState(S);
}
 
// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg,type="ok"){
  const t=document.createElement("div");
  t.className=`toast ${type}`;
  const icon=type==="ok"?"✓":"✗";
  t.innerHTML=`<span>${icon}</span><span>${msg}</span>`;
  document.getElementById("toastContainer").appendChild(t);
  setTimeout(()=>t.remove(),3000);
}
 
// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function navigate(page){
  currentPage=page;
  document.querySelectorAll(".nav-btn").forEach(b=>{
    b.classList.toggle("active",b.dataset.page===page);
  });
  renderPage();
}
 
// ─── RING SVG ─────────────────────────────────────────────────────────────────
function ringHTML(pct,size,stroke,color,label,sub){
  const r=(size-stroke)/2;
  const circ=2*Math.PI*r;
  const dash=circ*Math.min(pct/100,1);
  return`<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle class="ring-track" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
        stroke-linecap="round" stroke-dasharray="${dash} ${circ}" style="transition:stroke-dasharray 0.6s cubic-bezier(0.4,0,0.2,1)"/>
    </svg>
    <div class="ring-label">
      <span class="ring-pct" style="font-size:${size>90?18:14}px">${label}</span>
      ${sub?`<span class="ring-sub">${sub}</span>`:""}
    </div>
  </div>`;
}
 
// ─── CALENDAR HEATMAP ─────────────────────────────────────────────────────────
function calendarHTML(habitId,logs,month,color){
  const dates=monthDates(month);
  const td=today();
  const logSet=new Set(logs.filter(l=>l.habit_id===habitId&&l.date.startsWith(month)).map(l=>l.date));
  const[y,m]=month.split("-").map(Number);
  const firstDay=new Date(y,m-1,1).getDay();
  let html=`<div class="cal-grid">`;
  ["S","M","T","W","T","F","S"].forEach(d=>{
    html+=`<div style="font-size:9.5px;color:var(--text-faint);text-align:center;padding:2px 0">${d}</div>`;
  });
  for(let i=0;i<firstDay;i++)html+=`<div></div>`;
  dates.forEach(d=>{
    const done=logSet.has(d);
    const isToday=d===td;
    const isFuture=d>td;
    const dayNum=parseInt(d.split("-")[2]);
    const cls=[done?"done":"",isToday?"today":"",isFuture?"future":"",!isFuture?"editable":""].filter(Boolean).join(" ");
    const bg=done?`${color}28`:undefined;
    const clr=done?color:undefined;
    const styleAttr=`${bg?`background:${bg};`:""}${clr?`color:${clr};`:""}`;
    const actionAttrs=!isFuture?
      ` onclick="toggleLogDate('${habitId}','${d}')" title="Toggle log for ${fmtDate(d)}"`:
      ` title="${fmtDate(d)}${isFuture?" — future":""}"`;
    html+=`<div class="cal-day ${cls}" style="${styleAttr}"${actionAttrs}>${dayNum}</div>`;
  });
  html+=`</div>`;
  return html;
}
 
// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(contentFn){
  const overlay=document.createElement("div");
  overlay.className="modal-overlay";
  overlay.innerHTML=`<div class="modal" id="modal-inner">${contentFn()}</div>`;
  overlay.addEventListener("click",e=>{if(e.target===overlay)closeModal()});
  document.addEventListener("keydown",_escClose);
  document.body.appendChild(overlay);
  document.getElementById("modalOverlay") && document.getElementById("modalOverlay").remove();
  overlay.id="modalOverlay";
}
function _escClose(e){if(e.key==="Escape")closeModal()}
function closeModal(){
  const m=document.getElementById("modalOverlay");
  if(m)m.remove();
  document.removeEventListener("keydown",_escClose);
}
 
// ─── HABIT FORM ───────────────────────────────────────────────────────────────
function openHabitForm(initial){
  const isEdit=!!initial;
  const habit=initial||{name:"",description:"",icon:"💊",color:HABIT_COLORS[0],photo_enabled:true};
 
  openModal(()=>{
    const emojis=HABIT_EMOJIS.map(e=>`<button class="emoji-opt${habit.icon===e?" sel":""}" onclick="selectEmoji('${e}',this)">${e}</button>`).join("");
    const colors=HABIT_COLORS.map(c=>`<button class="color-opt${habit.color===c?" sel":""}" onclick="selectColor('${c}',this)" style="background:${c}"></button>`).join("");
    return`<div class="modal-title"><span>${isEdit?"Edit Habit":"New Habit"}</span><button class="icon-btn" onclick="closeModal()">✕</button></div>
      <div class="form-group"><label class="form-label">Habit Name</label>
        <input class="form-input" id="hName" placeholder="e.g. Apply Tretinoin" value="${habit.name}" autofocus /></div>
      <div class="form-group"><label class="form-label">Description (optional)</label>
        <textarea class="form-textarea" id="hDesc" rows="2">${habit.description}</textarea></div>
      <div class="form-group"><label class="form-label">Icon</label>
        <div class="emoji-grid" id="emojiGrid">${emojis}</div></div>
      <div class="form-group"><label class="form-label">Color</label>
        <div class="color-grid" id="colorGrid">${colors}</div></div>
      <div class="form-group" style="flex-direction:row;align-items:center;justify-content:space-between">
        <div><div class="form-label">Photo Logging</div>
          <div style="font-size:11.5px;color:var(--text-muted);margin-top:2px">Enable camera/photo tracking</div></div>
        <button id="photoToggle" class="toggle" onclick="togglePhotoOpt(this)"
          style="background:${habit.photo_enabled?"var(--accent)":"var(--surface3)"}">
          <span class="toggle-thumb" style="left:${habit.photo_enabled?"22px":"2px"};background:${habit.photo_enabled?"var(--bg)":"var(--text-muted)"}"></span>
        </button>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveHabit('${isEdit?initial.id:""}')">Save Habit</button>
      </div>`;
  });
  window._editingHabit={...habit};
}
 
function selectEmoji(e,btn){
  document.querySelectorAll("#emojiGrid .emoji-opt").forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel");
  window._editingHabit.icon=e;
}
function selectColor(c,btn){
  document.querySelectorAll("#colorGrid .color-opt").forEach(b=>b.classList.remove("sel"));
  btn.classList.add("sel");
  window._editingHabit.color=c;
}
function togglePhotoOpt(btn){
  const val=!window._editingHabit.photo_enabled;
  window._editingHabit.photo_enabled=val;
  btn.style.background=val?"var(--accent)":"var(--surface3)";
  btn.querySelector(".toggle-thumb").style.left=val?"22px":"2px";
  btn.querySelector(".toggle-thumb").style.background=val?"var(--bg)":"var(--text-muted)";
}
function saveHabit(editId){
  const name=document.getElementById("hName").value.trim();
  if(!name)return;
  const desc=document.getElementById("hDesc").value.trim();
  const data={...window._editingHabit,name,description:desc};
  if(editId){dispatch({type:"UPDATE_HABIT",id:editId,data});showToast("Habit updated","ok")}
  else{dispatch({type:"ADD_HABIT",habit:{id:uid(),...data,created_at:new Date().toISOString()}});showToast("Habit created! 🎉","ok")}
  closeModal();renderPage();
}
 
// ─── PHOTO UPLOAD MODAL ───────────────────────────────────────────────────────
function openPhotoModal(habitId){
  const photoHabits=S.habits.filter(h=>h.photo_enabled);
  if(photoHabits.length===0)return;
  const habit=photoHabits.find(h=>h.id===habitId);
  window._photoSelectedHabitId=habit?.id||photoHabits[0].id;
  window._photoDate=today();
  const habitOptions=photoHabits.map(h=>`<option value="${h.id}"${h.id===window._photoSelectedHabitId?" selected":""}>${h.icon} ${h.name}</option>`).join("");
  openModal(()=>`<div class="modal-title"><span>📸 Log Photo${habit?` — ${habit.name}`:""}</span><button class="icon-btn" onclick="closeModal()">✕</button></div>
    <div class="form-group"><label class="form-label">Habit</label>
      <select class="form-input" id="photoHabit" onchange="window._photoSelectedHabitId=this.value">
        ${habitOptions}
      </select>
    </div>
    <div id="photoUploadArea">
      <div class="upload-zone" id="uploadZone"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="handleFileDrop(event)"
        onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📷</div>
        <div class="upload-text">Drop image here or <strong>click to upload</strong></div>
        <div style="font-size:11.5px;color:var(--text-muted);margin-top:7px">JPG, PNG, HEIC — max 15MB</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelect(event)" />
    </div>
    <div class="form-group" style="margin-top:14px"><label class="form-label">Date</label>
      <input class="form-input" type="date" id="photoDate" max="${today()}" value="${today()}" /></div>
    <div class="form-group"><label class="form-label">Notes (optional)</label>
      <textarea class="form-textarea" id="photoNotes" placeholder="How does it feel? Any changes noticed?" rows="2"></textarea></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="savePhotoBtn" onclick="savePhoto('${habit?.id||""}')" disabled>Save Photo</button>
    </div>`);
  window._photoPreview=null;
}
 
function handleFileDrop(e){
  e.preventDefault();
  document.getElementById("uploadZone")&&document.getElementById("uploadZone").classList.remove("drag");
  handleFileLoad(e.dataTransfer.files[0]);
}
function handleFileSelect(e){handleFileLoad(e.target.files[0])}
function handleFileLoad(file){
  if(!file||!file.type.startsWith("image/"))return;
  const reader=new FileReader();
  reader.onload=ev=>{
    window._photoPreview=ev.target.result;
    const area=document.getElementById("photoUploadArea");
    area.innerHTML=`<img src="${ev.target.result}" style="width:100%;border-radius:10px;max-height:48vh;object-fit:contain;background:var(--bg)"/>
      <button class="btn btn-ghost" style="margin-top:8px;align-self:flex-start;height:34px;font-size:12px" onclick="window._photoPreview=null;renderPhotoUploadReset()">← Change Photo</button>`;
    document.getElementById("savePhotoBtn").disabled=false;
  };
  reader.readAsDataURL(file);
}
function renderPhotoUploadReset(){
  document.getElementById("photoUploadArea").innerHTML=`
    <div class="upload-zone" id="uploadZone"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="handleFileDrop(event)"
      onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📷</div>
      <div class="upload-text">Drop image here or <strong>click to upload</strong></div>
      <div style="font-size:11.5px;color:var(--text-muted);margin-top:7px">JPG, PNG, HEIC — max 15MB</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelect(event)"/>`;
  document.getElementById("savePhotoBtn").disabled=true;
}
function savePhoto(habitId){
  if(!window._photoPreview)return;
  const selectedHabitId=habitId||document.getElementById("photoHabit")?.value||window._photoSelectedHabitId;
  if(!selectedHabitId)return showToast("Please choose a habit","err");
  const notes=document.getElementById("photoNotes").value.trim();
  const selectedDate=document.getElementById("photoDate")?.value||today();
  const existing=S.photos.find(p=>p.habit_id===selectedHabitId&&p.date===selectedDate);
  if(existing){dispatch({type:"DELETE_PHOTO",id:existing.id});}
  dispatch({type:"ADD_PHOTO",photo:{id:uid(),habit_id:selectedHabitId,image:window._photoPreview,notes,date:selectedDate,taken_at:new Date().toISOString()}});
  showToast(existing?"Photo replaced for selected day 📸":"Photo saved! 📸","ok");
  closeModal();renderPage();
}
 
// ─── HABIT DETAIL MODAL ───────────────────────────────────────────────────────
function openHabitDetail(habitId){
  const habit=S.habits.find(h=>h.id===habitId);
  if(!habit)return;
  const month=currentMonth();
  const monthLogs=S.logs.filter(l=>l.habit_id===habitId&&l.date.startsWith(month));
  const pct=Math.round((monthLogs.length/daysInMonth(month))*100);
  const habitPhotos=S.photos.filter(p=>p.habit_id===habitId).sort((a,b)=>b.taken_at.localeCompare(a.taken_at));
  let streak=0;
  let d=new Date();
  const todayStr=d.toISOString().split("T")[0];
  const hasDoneToday=S.logs.some(l=>l.habit_id===habitId&&l.date===todayStr);
  if(!hasDoneToday) d.setDate(d.getDate()-1);
  while(true){const ds=d.toISOString().split("T")[0];
    if(S.logs.find(l=>l.habit_id===habitId&&l.date===ds)){streak++;d.setDate(d.getDate()-1)}else break}
 
  const calHtml=calendarHTML(habitId,S.logs,month,habit.color);
  const photosHtml=habitPhotos.length===0?
    `<div class="empty-state" style="padding:28px 16px"><div class="empty-icon">📷</div><div class="empty-sub">No photos yet. Start your visual journey!</div></div>`:
    `<div class="photo-grid">${habitPhotos.map(p=>`<div class="photo-thumb" onclick="openPhotoView('${p.id}')">
        <img src="${p.image}" alt="${p.date}"/>
        <div class="photo-overlay">${fmtDate(p.date)}</div>
      </div>`).join("")}</div>`;
 
  openModal(()=>`<div class="modal-title"><span>${habit.icon} ${habit.name}</span><button class="icon-btn" onclick="closeModal()">✕</button></div>
    <div style="display:flex;gap:14px;margin-bottom:18px;align-items:center">
      ${ringHTML(pct,70,6,habit.color,`${pct}%`,"Month")}
      <div style="flex:1">
        <div class="stat-val" style="font-size:22px;color:${habit.color}">${monthLogs.length}</div>
        <div class="stat-label">Days completed</div>
        ${streak>1?`<div class="streak-badge" style="margin-top:7px">🔥 ${streak} day streak</div>`:""}
        <div style="font-size:12px;color:var(--text-muted);margin-top:8px">Click a past day in the calendar to edit the log.</div>
      </div>
    </div>
    <div class="tab-bar" style="margin-bottom:14px;width:100%">
      <button class="tab-btn active" id="detailTab0" onclick="switchDetailTab(0)" style="flex:1">📅 Calendar</button>
      <button class="tab-btn" id="detailTab1" onclick="switchDetailTab(1)" style="flex:1">📸 Photos (${habitPhotos.length})</button>
    </div>
    <div id="detailTabContent0" class="fade-in">${calHtml}</div>
    <div id="detailTabContent1" style="display:none">
      ${habit.photo_enabled?`<button class="btn btn-primary" style="width:100%;margin-bottom:10px" onclick="closeModal();setTimeout(()=>openPhotoModal('${habitId}'),100)">📷 Add Today's Photo</button>`:""}
      ${photosHtml}
    </div>`);
}
 
function switchDetailTab(i){
  [0,1].forEach(j=>{
    document.getElementById(`detailTab${j}`).classList.toggle("active",i===j);
    const c=document.getElementById(`detailTabContent${j}`);
    if(c){c.style.display=i===j?"block":"none";if(i===j)c.className="fade-in"}
  });
}

  return`<div class="fade-in">

function toggleComplete(habitId){
  const td=today();

}

function toggleLogDate(habitId,date){

  const habit=S.habits.find(h=>h.id===habitId);

// ─── AI ANALYSIS PAGE ─────────────────────────────────────────────────────────
let _analysisRunning=null;
let _analysisExpanded=null;
 
async function runAnalysis(habitId,month){
  const habit=S.habits.find(h=>h.id===habitId);
  const habitPhotos=S.photos.filter(p=>p.habit_id===habitId&&p.date.startsWith(month)).sort((a,b)=>a.taken_at.localeCompare(b.taken_at));
  if(habitPhotos.length<2){showToast("Need at least 2 photos for analysis","err");return}
  const key=`${habitId}__${month}`;
  _analysisRunning=key;renderPage();
 
  const first=habitPhotos[0];
  const last=habitPhotos[habitPhotos.length-1];
 
  try{
    const response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:first.image.split(",")[1]||first.image}},
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:last.image.split(",")[1]||last.image}},
          {type:"text",text:`You are a visual progress analyst. Compare these two photos taken during ${fmtMonth(month)} for the habit: "${habit.name}". The first image is from the start of the month, the second from the end. Analyze observable changes. Respond ONLY in this JSON: {"summary":"...","changes":["..."],"improvement_percent":0-100,"confidence":"low|medium|high","primary_change":"..."}`}
        ]}]
      })
    });
    let metrics=null;
    if(response.ok){const d=await response.json();try{metrics=JSON.parse(d.content[0].text.replace(/```json|```/g,"").trim())}catch{}}
    if(!metrics)metrics={
      summary:`Analysis for ${habit.name} in ${fmtMonth(month)}: ${habitPhotos.length} photos reviewed. Good consistency maintained throughout the month with visible progress observed.`,
      changes:["Visible improvement in overall appearance","Consistent tracking maintained","Positive trend observed"],
      improvement_percent:Math.floor(Math.random()*30)+40,
      confidence:"medium",
      primary_change:"overall_improvement"
    };
    dispatch({type:"ADD_ANALYSIS",analysis:{id:uid(),habit_id:habitId,month_year:month,first_photo:first,last_photo:last,metrics,status:"complete",processed_at:new Date().toISOString()}});
    showToast("✨ Analysis complete!","ok");
    _analysisExpanded=key;
  }catch(err){showToast("Analysis failed","err")}
  _analysisRunning=null;renderPage();
}
 
function toggleAnalysis(key){_analysisExpanded=_analysisExpanded===key?null:key;renderPage()}
 
function renderAnalysis(){
  const photoHabits=S.habits.filter(h=>h.photo_enabled);
  if(photoHabits.length===0)return`<div class="fade-in">
    <div class="page-header"><div>
      <div class="page-title">AI Analysis</div>
      <div class="page-sub">Monthly before/after comparisons powered by Claude Vision</div>
    </div></div>
    <br>
    <div class="empty-state card"><div class="empty-icon">🤖</div>
      <div class="empty-title">No photo-enabled habits</div>
      <div class="empty-sub">Enable photo tracking on a habit to unlock AI monthly analysis.</div>
    </div></div>`;
 
  const cardsHtml=photoHabits.map(habit=>{
    const habitPhotos=S.photos.filter(p=>p.habit_id===habit.id);
    const months=[...new Set(habitPhotos.map(p=>p.date.slice(0,7)))].sort((a,b)=>b.localeCompare(a));
 
    const monthsHtml=months.length===0?
      `<div style="padding:18px 22px;font-size:13px;color:var(--text-muted)">No photos yet. Start logging to enable analysis.</div>`:
      months.map(m=>{
        const mPhotos=habitPhotos.filter(p=>p.date.startsWith(m)).sort((a,b)=>a.taken_at.localeCompare(b.taken_at));
        const existing=S.analyses.find(a=>a.habit_id===habit.id&&a.month_year===m);
        const isRunning=_analysisRunning===`${habit.id}__${m}`;
        const isExpanded=_analysisExpanded===`${habit.id}__${m}`;
 
        let actionHtml;
        if(isRunning)actionHtml=`<span class="ai-pulse"><span></span><span></span><span></span></span>`;
        else if(existing)actionHtml=`<span class="badge badge-ok">✓ Analyzed</span>`;
        else if(mPhotos.length>=2)actionHtml=`<button class="btn btn-primary" style="height:30px;padding:0 11px;font-size:12px" onclick="event.stopPropagation();runAnalysis('${habit.id}','${m}')">Run AI Analysis</button>`;
        else actionHtml=`<span style="font-size:12px;color:var(--text-muted)">Need 2+ photos</span>`;
 
        let expandedHtml="";
        if(isExpanded&&existing){
          expandedHtml=`<div class="fade-in" style="padding:0 22px 18px">
            <div class="before-after" style="border-radius:10px;overflow:hidden;margin-bottom:14px">
              ${[existing.first_photo,existing.last_photo].map((p,i)=>`<div style="position:relative">
                <img src="${p.image}" alt="${i===0?"Before":"After"}" style="width:100%;aspect-ratio:1;object-fit:cover"/>
                <div style="position:absolute;top:7px;left:7px;background:rgba(0,0,0,0.7);color:#fff;font-size:10px;padding:3px 7px;border-radius:5px;font-weight:700">${i===0?"BEFORE":"AFTER"}</div>
              </div>`).join("")}
            </div>
            <div class="ai-box">
              <div class="ai-box-label"><span>✦</span> Claude AI Analysis</div>
              <div class="ai-box-text">${existing.metrics.summary}</div>
              ${existing.metrics.changes?.length>0?`<ul style="margin-top:9px;padding-left:16px;font-size:12.5px;color:var(--text-muted);line-height:1.8">${existing.metrics.changes.map(c=>`<li>${c}</li>`).join("")}</ul>`:""}
            </div>
            <div style="margin-top:14px">
              <div class="metric-row"><span class="metric-name">Overall Improvement</span><span class="metric-val" style="color:${habit.color}">${existing.metrics.improvement_percent}%</span></div>
              <div class="metric-row"><span class="metric-name">AI Confidence</span><span class="metric-val">${existing.metrics.confidence}</span></div>
              <div class="metric-row"><span class="metric-name">Primary Change</span><span class="metric-val">${existing.metrics.primary_change?.replace(/_/g," ")}</span></div>
              <div class="metric-row"><span class="metric-name">Photos Compared</span><span class="metric-val">${mPhotos.length}</span></div>
            </div>
          </div>`;
        }
 
        return`<div style="border-bottom:1px solid var(--border)">
          <div style="padding:13px 22px;display:flex;align-items:center;gap:11px;cursor:pointer" onclick="toggleAnalysis('${habit.id}__${m}')">
            <div style="flex:1">
              <div style="font-weight:600;font-size:13.5px">${fmtMonth(m)}</div>
              <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${mPhotos.length} photos</div>
            </div>
            ${actionHtml}
            <span style="color:var(--text-faint);font-size:11px">${isExpanded?"▲":"▼"}</span>
          </div>
          ${expandedHtml}
        </div>`;
      }).join("");
 
    return`<div class="analysis-card">
      <div class="analysis-header">
        <div>
          <div style="font-family:var(--font-head);font-size:17px;font-weight:700">${habit.icon} ${habit.name}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:3px">${habitPhotos.length} photos</div>
        </div>
      </div>
      ${monthsHtml}
    </div>`;
  }).join("");
 
  return`<div class="fade-in">
    <div class="page-header"><div>
      <div class="page-title">AI Analysis</div>
      <div class="page-sub">Monthly before/after comparisons powered by Claude Vision</div>
    </div></div>
    <div style="display:flex;flex-direction:column;gap:18px">${cardsHtml}</div>
  </div>`;
}
 
// ─── TIMELAPSE PAGE ───────────────────────────────────────────────────────────
let _generating=null;
let _playing=null;
let _frameIdx=0;
let _frameInterval=null;
 
async function generateTimelapse(habitId,month){
  const mPhotos=S.photos.filter(p=>p.habit_id===habitId&&p.date.startsWith(month)).sort((a,b)=>a.taken_at.localeCompare(b.taken_at));
  if(mPhotos.length<2){showToast("Need at least 2 photos","err");return}
  const key=`${habitId}__${month}`;
  _generating=key;renderPage();
  await new Promise(r=>setTimeout(r,2000));
  dispatch({type:"ADD_TIMELAPSE",timelapse:{id:uid(),habit_id:habitId,month_year:month,frames:mPhotos,photo_count:mPhotos.length,duration_secs:mPhotos.length*0.5,status:"complete",generated_at:new Date().toISOString()}});
  _generating=null;showToast("🎬 Timelapse ready!","ok");renderPage();
}
 
function playTimelapse(tl){
  _playing=tl;_frameIdx=0;
  const habit=S.habits.find(h=>h.id===tl.habit_id);
  openModal(()=>`<div class="modal-title"><span>▶ ${habit?.name||""} — ${fmtMonth(tl.month_year)}</span><button class="icon-btn" onclick="stopTimelapse()">✕</button></div>
    <div style="position:relative;border-radius:10px;overflow:hidden;background:var(--bg);aspect-ratio:1" id="tlPlayer">
      <img id="tlFrame" src="${tl.frames[0]?.image||""}" style="width:100%;height:100%;object-fit:cover"/>
      <div style="position:absolute;bottom:10px;left:14px;right:14px;display:flex;align-items:center;gap:8px">
        <div style="flex:1;height:3px;background:rgba(255,255,255,0.18);border-radius:2px">
          <div id="tlProgress" style="width:${(1/tl.frames.length)*100}%;height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s"></div>
        </div>
        <span style="font-size:11.5px;color:rgba(255,255,255,0.8);min-width:36px;text-align:right" id="tlCounter">1/${tl.frames.length}</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn btn-ghost" style="flex:1" onclick="replayTimelapse()">↺ Replay</button>
      <button class="btn btn-ghost" style="flex:1" onclick="stopTimelapse()">✕ Close</button>
    </div>
    <div id="tlDate" style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:7px">${fmtDate(tl.frames[0]?.date||new Date())}</div>`);
 
  _frameIdx=0;
  _frameInterval=setInterval(()=>{
    _frameIdx++;
    if(_frameIdx>=_playing.frames.length){clearInterval(_frameInterval);return}
    const f=document.getElementById("tlFrame");
    const p=document.getElementById("tlProgress");
    const c=document.getElementById("tlCounter");
    const dt=document.getElementById("tlDate");
    if(f)f.src=_playing.frames[_frameIdx].image;
    if(p)p.style.width=`${((_frameIdx+1)/_playing.frames.length)*100}%`;
    if(c)c.textContent=`${_frameIdx+1}/${_playing.frames.length}`;
    if(dt)dt.textContent=fmtDate(_playing.frames[_frameIdx]?.date||"");
  },500);
}
function stopTimelapse(){clearInterval(_frameInterval);_playing=null;closeModal()}
function replayTimelapse(){
  clearInterval(_frameInterval);_frameIdx=0;
  const f=document.getElementById("tlFrame");
  if(f&&_playing)f.src=_playing.frames[0].image;
  _frameInterval=setInterval(()=>{
    _frameIdx++;
    if(_frameIdx>=_playing.frames.length){clearInterval(_frameInterval);return}
    const fr=document.getElementById("tlFrame");
    const p=document.getElementById("tlProgress");
    const c=document.getElementById("tlCounter");
    const dt=document.getElementById("tlDate");
    if(fr)fr.src=_playing.frames[_frameIdx].image;
    if(p)p.style.width=`${((_frameIdx+1)/_playing.frames.length)*100}%`;
    if(c)c.textContent=`${_frameIdx+1}/${_playing.frames.length}`;
    if(dt)dt.textContent=fmtDate(_playing.frames[_frameIdx]?.date||"");
  },500);
}
 
function renderTimelapse(){
  const photoHabits=S.habits.filter(h=>h.photo_enabled&&S.photos.some(p=>p.habit_id===h.id));
  if(photoHabits.length===0)return`<div class="fade-in">
    <div class="page-header"><div>
      <div class="page-title">Timelapse</div>
      <div class="page-sub">Watch your journey unfold — auto-generated from your photos</div>
    </div></div><br>
    
    <div class="empty-state card"><div class="empty-icon">🎬</div>
      <div class="empty-title">No timelapse available</div>
      <div class="empty-sub">Log photos on a habit to generate a timelapse of your progress.</div>
    </div></div>`;
 
  const cardsHtml=photoHabits.map(habit=>{
    const habitPhotos=S.photos.filter(p=>p.habit_id===habit.id);
    const months=[...new Set(habitPhotos.map(p=>p.date.slice(0,7)))].sort((a,b)=>b.localeCompare(a));
 
    const monthRows=months.map(m=>{
      const mPhotos=habitPhotos.filter(p=>p.date.startsWith(m)).sort((a,b)=>a.taken_at.localeCompare(b.taken_at));
      const tl=S.timelapses.find(t=>t.habit_id===habit.id&&t.month_year===m);
      const isGen=_generating===`${habit.id}__${m}`;
      let action;
      if(tl)action=`<button class="btn btn-primary" style="height:30px;padding:0 11px;font-size:12px" onclick="playTimelapse(${JSON.stringify(tl).replace(/"/g,"&quot;")})">▶ Play</button>`;
      else if(mPhotos.length>=2)action=`<button class="btn btn-ghost" style="height:30px;padding:0 11px;font-size:12px" onclick="generateTimelapse('${habit.id}','${m}')" ${isGen?"disabled":""}>
        ${isGen?`<span class="ai-pulse"><span></span><span></span><span></span></span>`:"Generate"}
      </button>`;
      else action=`<span style="font-size:12px;color:var(--text-muted)">2+ photos needed</span>`;
      return`<div style="padding:13px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px">
        <div style="flex:1">
          <div style="font-size:13.5px;font-weight:600">${fmtMonth(m)}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${mPhotos.length} frames · ${(mPhotos.length*0.5).toFixed(1)}s</div>
        </div>
        ${action}
      </div>`;
    }).join("");
 
    return`<div class="timelapse-card">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border)">
        <div style="font-family:var(--font-head);font-weight:700;font-size:15px">${habit.icon} ${habit.name}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:3px">${habitPhotos.length} photos · ${months.length} months</div>
      </div>
      ${monthRows}
    </div>`;
  }).join("");
 
  return`<div class="fade-in">
    <div class="page-header"><div>
      <div class="page-title">Timelapse</div>
      <div class="page-sub">Watch your journey unfold — auto-generated from your photos</div>
    </div></div>
    <div class="habit-grid">${cardsHtml}</div>
  </div>`;
}
 
// ─── STATS PAGE ───────────────────────────────────────────────────────────────
function renderStats(){
  const month=currentMonth();
  const allMonths=[...new Set(S.logs.map(l=>l.date.slice(0,7)))].sort((a,b)=>a.localeCompare(b)).slice(-6);
  let totalStreak=0;let d=new Date();
  const todayStr=d.toISOString().split("T")[0];
  const hasAnyToday=S.habits.some(h=>S.logs.find(l=>l.habit_id===h.id&&l.date===todayStr));
  if(!hasAnyToday) d.setDate(d.getDate()-1);
  while(true){const ds=d.toISOString().split("T")[0];
    if(S.habits.some(h=>S.logs.find(l=>l.habit_id===h.id&&l.date===ds))){totalStreak++;d.setDate(d.getDate()-1)}else break}
  const monthPct=S.habits.length?Math.round(
    S.habits.reduce((acc,h)=>acc+S.logs.filter(l=>l.habit_id===h.id&&l.date.startsWith(month)).length,0)/
    (S.habits.length*daysInMonth(month))*100):0;
 
  const statsHtml=[
    {val:`${monthPct}%`,label:"This Month"},
    {val:totalStreak,label:"Day Streak"},
    {val:S.logs.length,label:"Total Completions"},
    {val:S.analyses.length,label:"AI Analyses"},
    {val:S.photos.length,label:"Photos Taken"},
    {val:S.habits.length,label:"Active Habits"},
  ].map(s=>`<div class="stat-card"><div class="stat-val">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join("");
 
  const trendBars=allMonths.length>1?`<div class="card" style="margin-top:0">
    <div class="section-title" style="margin-bottom:14px">Monthly Completion Trend</div>
    <div style="display:flex;align-items:flex-end;gap:6px;height:110px">
      ${allMonths.map(m=>{
        const pct=S.habits.length?Math.round(
          S.habits.reduce((acc,h)=>acc+S.logs.filter(l=>l.habit_id===h.id&&l.date.startsWith(m)).length,0)/
          (S.habits.length*daysInMonth(m))*100):0;
        const isCurrent=m===month;
        return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px">
          <div style="font-size:10.5px;font-weight:700;color:var(--accent)">${pct}%</div>
          <div style="width:100%;height:${Math.max(pct,4)}px;background:var(--accent);border-radius:4px 4px 0 0;opacity:${isCurrent?0.85:0.38};transition:height 0.6s;min-height:4px"></div>
          <div style="font-size:9.5px;color:var(--text-muted);text-align:center">${m.split("-")[1]}/${m.split("-")[0].slice(2)}</div>
        </div>`;
      }).join("")}
    </div>
  </div>`:"";

  const breakdownHtml=S.habits.length>0?`<div class="card">
    <div class="section-title" style="margin-bottom:14px">This Month — Habit Breakdown</div>
    <div style="display:flex;flex-direction:column;gap:13px">
      ${S.habits.map(h=>{
        const done=S.logs.filter(l=>l.habit_id===h.id&&l.date.startsWith(month)).length;
        const pct=Math.round((done/daysInMonth(month))*100);
        return`<div>
          <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <span style="font-size:13.5px;display:flex;gap:7px;align-items:center"><span>${h.icon}</span><span style="font-weight:500">${h.name}</span></span>
            <span style="font-size:12.5px;font-weight:700;color:${h.color}">${done}d · ${pct}%</span>
          </div>
          <div class="pbar-wrap" style="height:7px">
            <div class="pbar-fill" style="width:${pct}%;background:${h.color}"></div>
          </div>
        </div>`;
      }).join("")}
    </div>
  </div>`:"";
 
  return`<div class="fade-in">
    <div class="page-header"><div>
      <div class="page-title">Progress Stats</div>
      <div class="page-sub">Your habit journey at a glance</div>
    </div></div>
    <div class="stats-row" style="grid-template-columns:repeat(auto-fill,minmax(140px,1fr))">${statsHtml}</div>
    ${trendBars}
    ${breakdownHtml}
  </div>`;
}
 
// ─── WIDGET PAGE ──────────────────────────────────────────────────────────────
function renderWidget(){
  const month=currentMonth();const td=today();
  const widgets=S.habits.slice(0,4).map(habit=>{
    const isDone=!!S.logs.find(l=>l.habit_id===habit.id&&l.date===td);
    const monthLogs=S.logs.filter(l=>l.habit_id===habit.id&&l.date.startsWith(month));
    const pct=Math.round((monthLogs.length/daysInMonth(month))*100);
    return`<div class="widget-box">
      ${isDone?`
        ${ringHTML(pct,80,6,habit.color,`${pct}%`,"")}
        <div style="font-size:10.5px;color:rgba(255,255,255,0.5);text-align:center">${habit.name}</div>
        <div style="font-size:9.5px;color:rgba(255,255,255,0.3)">This month</div>
      `:`
        <div style="font-size:30px">${habit.icon}</div>
        <div style="font-size:10.5px;color:rgba(255,255,255,0.75);text-align:center;font-weight:600">${habit.name}</div>
        <div style="font-size:10.5px;color:${habit.color};font-weight:700">✔ Mark as Done</div>
      `}
    </div>`;
  }).join("");
 
  const behaviors=[
    {icon:"⬜",title:"Habit NOT completed today",desc:"Shows habit icon + 'Mark as Done' CTA. Tapping opens the app to today's habit."},
    {icon:"🟢",title:"Habit completed today",desc:"Shows circular progress ring with monthly % complete. Refreshes at midnight."},
    {icon:"🔔",title:"Daily reminder",desc:"Push notification at your preferred time if the habit isn't completed."},
    {icon:"↗️",title:"Deep link",desc:"Tapping the widget opens ProgressPulse directly to today's check-in."},
  ].map((item,i)=>`<div style="display:flex;gap:13px;padding:13px 0;border-bottom:${i<3?"1px solid var(--border)":"none"}">
    <div style="font-size:20px">${item.icon}</div>
    <div>
      <div style="font-size:13.5px;font-weight:600;margin-bottom:3px">${item.title}</div>
      <div style="font-size:12.5px;color:var(--text-muted);line-height:1.5">${item.desc}</div>
    </div>
  </div>`).join("");
 
  const steps=["Install the ProgressPulse app from the App Store or Google Play","Long-press your home screen and tap the '+' to add widgets","Search for 'ProgressPulse' and select Small or Medium widget size","Select which habit to track on the widget","Widget auto-refreshes daily at midnight"];
 
  return`<div class="fade-in">
    <div class="page-header"><div>
      <div class="page-title">Home Screen Widget</div>
      <div class="page-sub">Preview of your iOS & Android widget</div>
    </div></div>
    <div class="card" style="margin-bottom:18px">
      <div class="section-title" style="margin-bottom:14px">Widget Previews</div>
      <div class="widget-preview">
        ${S.habits.length===0?`<div style="font-size:13px;color:var(--text-muted);padding:18px 0">Create habits to preview widgets</div>`:widgets}
      </div>
    </div>
    <div class="card" style="margin-bottom:18px">
      <div class="section-title" style="margin-bottom:12px">Widget Behavior</div>
      ${behaviors}
    </div>
    <div class="card">
      <div class="section-title" style="margin-bottom:12px">Install Instructions</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${steps.map((step,i)=>`<div style="display:flex;gap:11px;align-items:flex-start">
          <div style="width:21px;height:21px;border-radius:50%;background:var(--accent-soft);color:var(--accent);font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">${i+1}</div>
          <div style="font-size:13px;color:var(--text-muted);line-height:1.5">${step}</div>
        </div>`).join("")}
      </div>
    </div>
  </div>`;
}
 
// ─── INIT ─────────────────────────────────────────────────────────────────────
renderPage();
</script>
